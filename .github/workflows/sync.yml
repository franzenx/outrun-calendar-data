name: Weekly Event Sync
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python 2026
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Scraping Engine
        run: |
          pip install playwright
          playwright install chromium
          
      - name: Run Global Scraper
        run: python scraper.py
        
      - name: Commit and Push Results
        run: |
          git config --global user.name "Outrun Bot"
          git config --global user.email "bot@outrun.at"
          git add data.json
          # The 'exit 0' ensures that if there's nothing to commit, the job still succeeds
          git commit -m "Automated Global Refresh: $(date +'%Y-%m-%d')" || exit 0
          git push
