name: Weekly Event Sync
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch: 

# FORCE PERMISSIONS FOR 2026 GITHUB STANDARDS
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Scraping Engine
        run: |
          pip install playwright
          playwright install chromium
          
      - name: Run Global Scraper
        run: python scraper.py
        
      - name: Deploy Live Data
        run: |
          git config --global user.name "Outrun Bot"
          git config --global user.email "bot@outrun.at"
          git add data.json
          # Only commit if there are actually changes to avoid "Exit 1" errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Global Refresh: $(date +'%Y-%m-%d')" && git push)
