name: Scrape Luma Events
 
on:
  # Refresh every 6 hours
  schedule:
    - cron: '0 */6 * * *'
 
  # Manual trigger from GitHub UI → Actions → Run workflow
  workflow_dispatch:
 
jobs:
  scrape:
    name: Scrape & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
 
    permissions:
      contents: write   # Required to commit data.json back to the repo
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt
 
      - name: Install dependencies
        run: pip install -r requirements.txt
 
      - name: Run Luma scraper
        run: python scraper.py
 
      - name: Commit and push data.json
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet \
            && echo "data.json unchanged — skipping commit." \
            || (git commit -m "chore: refresh event data [skip ci]" && git push)
