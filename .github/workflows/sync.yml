name: Weekly Event Sync
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Python 2026
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          
      - name: Install Scraping Engine
        run: |
          pip install playwright
          playwright install chromium
          
      - name: Run Bi-Weekly Scraper
        run: python scraper.py
        
      - name: Deploy Live Data
        run: |
          git config user.name "Outrun Bot"
          git config user.email "bot@outrun.at"
          # The fix: Pull manual changes (like index.html edits) before pushing data
          git pull --rebase origin main  
          git add data.json
          git commit -m "Automated Global Refresh: $(date +'%Y-%m-%d')" || exit 0
          git push
