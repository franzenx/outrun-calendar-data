name: Weekly Event Sync
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Scraping Engine
        run: |
          pip install playwright
          playwright install chromium
          
      - name: Run Global Scraper
        run: python scraper.py
        
      - name: Commit and Push Results
        run: |
          git config --global user.name "Outrun Bot"
          git config --global user.email "bot@outrun.at"
          git add data.json
          # Commit only if changes exist, then push using the built-in token
          if ! git diff --cached --exit-code; then
            git commit -m "Automated Global Refresh: $(date +'%Y-%m-%d')"
            git push origin main
          else
            echo "No new events found. Skipping push."
          fi
