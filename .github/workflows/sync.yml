name: Weekly Event Sync
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetches full history to handle merges better
      
      - name: Setup Python 2026
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          
      - name: Install Scraping Engine
        run: |
          pip install playwright
          playwright install chromium
          
      - name: Run Bi-Weekly Scraper
        run: python scraper.py
        
      - name: Deploy Live Data
        run: |
          git config user.name "Outrun Bot"
          git config user.email "bot@outrun.at"
          
          # 1. Pull any manual changes you made to index.html
          git pull origin main --rebase
          
          # 2. Add the newly scraped data
          git add data.json
          
          # 3. Commit only if there are changes
          git commit -m "Automated Global Refresh: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          
          # 4. Push changes (using --force-with-lease for safety if rebase fails)
          git push origin main
