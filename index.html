<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outrun 2026 | Crypto Event Calendar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --mint:       #bbf7d0;
            --mint-glow:  rgba(187,247,208,0.15);
            --dark:       #080808;
            --surface:    #111111;
            --surface2:   #161616;
            --border:     rgba(255,255,255,0.06);
        }
        * { box-sizing: border-box; }
        body { background: var(--dark); font-family: 'Space Grotesk', sans-serif; color: #fff; margin: 0; }

        /* ── Tier colours ─────────────────── */
        .tier-1 { color: #bbf7d0; border-color: rgba(187,247,208,0.4); }
        .tier-2 { color: #fde68a; border-color: rgba(253,230,138,0.35); }
        .tier-3 { color: rgba(255,255,255,0.35); border-color: rgba(255,255,255,0.12); }
        .tier-1-bg { background: rgba(187,247,208,0.08); }
        .tier-2-bg { background: rgba(253,230,138,0.06); }

        /* ── Conference card ──────────────── */
        .conf-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1.25rem;
            transition: border-color .2s ease, box-shadow .2s ease, transform .15s ease;
            cursor: pointer;
        }
        .conf-card:hover { border-color: rgba(255,255,255,0.14); transform: translateY(-2px); }
        .conf-card.open  { border-color: rgba(187,247,208,0.5); box-shadow: 0 0 50px rgba(187,247,208,0.04); }
        .conf-card.tier-1-open { border-color: rgba(187,247,208,0.6); }
        .conf-card.tier-2-open { border-color: rgba(253,230,138,0.45); }

        /* ── Event row (Level 2) ──────────── */
        .event-row { border-top: 1px solid var(--border); transition: background .12s; }
        .event-row:hover { background: rgba(255,255,255,0.02); }
        .event-cover {
            width: 40px; height: 40px; border-radius: 8px;
            object-fit: cover; background: #1e1e1e; flex-shrink: 0;
        }

        /* ── Filter pills ────────────────── */
        .pill {
            font-size: .6rem; font-weight: 700; letter-spacing: .1em;
            text-transform: uppercase; padding: 3px 10px; border-radius: 999px;
            border: 1px solid transparent; cursor: pointer;
            transition: all .15s ease; white-space: nowrap;
        }
        .pill-inactive { border-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); }
        .pill-inactive:hover { border-color: rgba(255,255,255,0.22); color: rgba(255,255,255,0.65); }
        .pill-active-mint   { background: #bbf7d0; color: #000; }
        .pill-active-yellow { background: #fde68a; color: #000; }
        .pill-active-white  { background: rgba(255,255,255,0.9); color: #000; }

        /* ── Stat badge ──────────────────── */
        .stat-badge {
            font-size: .58rem; font-weight: 700; letter-spacing: .08em;
            text-transform: uppercase; padding: 2px 7px; border-radius: 6px;
            border: 1px solid; white-space: nowrap;
        }

        /* ── Sign-up button ───────────────── */
        .btn-signup {
            background: var(--mint); color: #000; font-weight: 700;
            font-size: .6rem; letter-spacing: .1em; text-transform: uppercase;
            padding: 7px 16px; border-radius: 999px; border: none; cursor: pointer;
            transition: transform .12s, box-shadow .12s; white-space: nowrap; flex-shrink: 0;
        }
        .btn-signup:hover { transform: scale(1.04); box-shadow: 0 4px 18px rgba(187,247,208,0.22); }
        .btn-website {
            font-size: .6rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
            padding: 7px 16px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.15);
            cursor: pointer; transition: border-color .12s; color: rgba(255,255,255,0.6);
            text-decoration: none; white-space: nowrap; flex-shrink: 0;
        }
        .btn-website:hover { border-color: rgba(255,255,255,0.4); color: #fff; }

        /* ── Skeleton loader ─────────────── */
        .skeleton {
            background: linear-gradient(90deg,#1a1a1a 25%,#222 50%,#1a1a1a 75%);
            background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: .4rem;
        }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        /* ── Chevron ─────────────────────── */
        .chevron { transition: transform .22s ease; }
        .chevron.open { transform: rotate(180deg); }

        .mint-glow { text-shadow: 0 0 30px rgba(187,247,208,0.45); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
    </style>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body x-data="outrunApp()" x-init="init()">
    <script src="https://lu.ma/checkout.js" id="luma-checkout" async></script>

    <!-- ── Nav ──────────────────────────────────────────────────────── -->
    <nav class="px-6 md:px-10 py-6 flex justify-between items-center max-w-7xl mx-auto">
        <div class="text-xl font-bold tracking-tighter uppercase italic">
            Outrun <span class="text-[#bbf7d0]">/ 2026</span>
        </div>
        <div class="flex items-center gap-3">
            <span x-show="lastUpdated" class="text-[10px] opacity-25 tracking-widest uppercase hidden md:block" x-text="lastUpdated"></span>
            <span class="stat-badge tier-1 text-[10px]" x-show="!loading" x-text="totalConfs + ' Events'"></span>
        </div>
    </nav>

    <!-- ── Hero ─────────────────────────────────────────────────────── -->
    <header class="max-w-7xl mx-auto px-6 md:px-10 pt-8 pb-10">
        <h1 class="text-5xl md:text-7xl font-bold tracking-tighter leading-none mb-3">
            100 <span class="text-[#bbf7d0] mint-glow">EVENTS</span>
        </h1>
        <p class="text-sm opacity-30 max-w-md mt-2">
            Tradedar Global Web3 &amp; Crypto Calendar 2026 — Tier 1 to 3. Click any event to see Luma side events and sign up directly.
        </p>

        <!-- ── Filters ─────────────────────────────────────────────── -->
        <div class="mt-8 space-y-3" x-show="!loading">

            <!-- Tier -->
            <div class="flex flex-wrap gap-2 items-center">
                <span class="text-[10px] opacity-25 uppercase tracking-widest mr-1 hidden md:block">Tier</span>
                <button @click="activeTier = null"
                    :class="activeTier === null ? 'pill-active-white' : 'pill-inactive'"
                    class="pill">All</button>
                <button @click="activeTier = activeTier === 1 ? null : 1"
                    :class="activeTier === 1 ? 'pill-active-mint' : 'pill-inactive'"
                    class="pill">Tier 1 — Must Attend</button>
                <button @click="activeTier = activeTier === 2 ? null : 2"
                    :class="activeTier === 2 ? 'pill-active-yellow' : 'pill-inactive'"
                    class="pill">Tier 2 — High Value</button>
                <button @click="activeTier = activeTier === 3 ? null : 3"
                    :class="activeTier === 3 ? 'pill-active-white' : 'pill-inactive'"
                    class="pill">Tier 3 — Monitor</button>
            </div>

            <!-- Quarter -->
            <div class="flex flex-wrap gap-2 items-center">
                <span class="text-[10px] opacity-25 uppercase tracking-widest mr-1 hidden md:block">Quarter</span>
                <button @click="activeQuarter = null"
                    :class="activeQuarter === null ? 'pill-active-white' : 'pill-inactive'"
                    class="pill">All Quarters</button>
                <template x-for="q in ['Q1','Q2','Q3','Q4','TBC']" :key="q">
                    <button @click="activeQuarter = activeQuarter === q ? null : q"
                        :class="activeQuarter === q ? 'pill-active-white' : 'pill-inactive'"
                        class="pill" x-text="q">
                    </button>
                </template>
            </div>

            <!-- Region -->
            <div class="flex flex-wrap gap-2 items-center">
                <span class="text-[10px] opacity-25 uppercase tracking-widest mr-1 hidden md:block">Region</span>
                <button @click="activeRegion = null"
                    :class="activeRegion === null ? 'pill-active-white' : 'pill-inactive'"
                    class="pill">All Regions</button>
                <template x-for="r in regions" :key="r">
                    <button @click="activeRegion = activeRegion === r ? null : r"
                        :class="activeRegion === r ? 'pill-active-white' : 'pill-inactive'"
                        class="pill" x-text="r">
                    </button>
                </template>
            </div>

        </div>

        <!-- Result count -->
        <div class="mt-5 text-xs opacity-25" x-show="!loading">
            Showing <span x-text="filteredConfs.length" class="font-bold"></span>
            of <span x-text="totalConfs"></span> events
        </div>
    </header>

    <!-- ── Main ─────────────────────────────────────────────────────── -->
    <main class="max-w-7xl mx-auto px-6 md:px-10 pb-32">

        <!-- Skeleton -->
        <template x-if="loading">
            <div class="space-y-3">
                <template x-for="n in 8" :key="n">
                    <div class="conf-card p-6">
                        <div class="flex gap-4">
                            <div class="skeleton h-3 w-12 rounded"></div>
                            <div class="skeleton h-3 w-40 rounded"></div>
                            <div class="skeleton h-3 w-24 rounded ml-auto"></div>
                        </div>
                    </div>
                </template>
            </div>
        </template>

        <!-- Error -->
        <template x-if="!loading && error">
            <div class="text-center py-24 opacity-40">
                <p class="text-sm font-bold uppercase tracking-widest mb-2">Failed to load calendar</p>
                <p class="text-xs opacity-60" x-text="error"></p>
                <button @click="init()" class="btn-signup mt-6">Retry</button>
            </div>
        </template>

        <!-- Empty -->
        <template x-if="!loading && !error && filteredConfs.length === 0">
            <div class="text-center py-24 opacity-25">
                <p class="text-sm font-bold uppercase tracking-widest">No events match this filter</p>
            </div>
        </template>

        <!-- ── Conference list ─────────────────────────────────────── -->
        <template x-if="!loading && !error">
            <div class="space-y-2">
                <template x-for="conf in filteredConfs" :key="conf.id">

                    <div class="conf-card"
                         :class="{
                             'open': openConf === conf.id,
                             'tier-1-open': openConf === conf.id && conf.tier === 1,
                             'tier-2-open': openConf === conf.id && conf.tier === 2
                         }">

                        <!-- ── Level 1 row ───────────────────────── -->
                        <div class="px-6 py-5 flex items-center gap-4"
                             @click="toggleConf(conf.id)">

                            <!-- Tier badge -->
                            <div class="flex-shrink-0 w-14 text-center">
                                <span class="stat-badge text-[9px]"
                                      :class="{
                                          'tier-1': conf.tier===1,
                                          'tier-2': conf.tier===2,
                                          'tier-3': conf.tier===3
                                      }"
                                      x-text="'T' + conf.tier"></span>
                            </div>

                            <!-- Date -->
                            <div class="flex-shrink-0 w-28 hidden sm:block">
                                <p class="text-[11px] font-mono opacity-50 leading-tight" x-text="conf.start"></p>
                                <p class="text-[10px] font-mono opacity-25 leading-tight"
                                   x-show="conf.end && conf.end !== conf.start"
                                   x-text="'→ ' + conf.end"></p>
                            </div>

                            <!-- Name + meta -->
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 flex-wrap">
                                    <h3 class="text-sm font-bold leading-snug"
                                        :class="{
                                            'text-white': conf.tier < 3,
                                            'text-white/60': conf.tier === 3
                                        }"
                                        x-text="conf.name"></h3>
                                    <span x-show="conf.status === '✅ Confirmed'"
                                          class="text-[9px] text-emerald-400 opacity-60">✅</span>
                                    <span x-show="conf.status === '⏳ TBC'"
                                          class="text-[9px] text-yellow-400 opacity-50">⏳ TBC</span>
                                </div>
                                <div class="flex items-center gap-3 mt-0.5 flex-wrap">
                                    <span class="text-[11px] opacity-35"
                                          x-text="conf.city + (conf.country ? ', ' + conf.country : '')"></span>
                                    <span class="text-[11px] opacity-20" x-show="conf.attendance"
                                          x-text="conf.attendance + ' attendees'"></span>
                                    <span class="text-[11px] opacity-20" x-show="conf.focus"
                                          x-text="conf.focus"></span>
                                </div>
                            </div>

                            <!-- Right: count + chevron -->
                            <div class="flex items-center gap-3 flex-shrink-0">
                                <span x-show="conf.events && conf.events.length > 0"
                                      class="stat-badge tier-1 text-[9px]"
                                      x-text="conf.events.length + ' side events'"></span>
                                <span x-show="conf.luma_slug && (!conf.events || conf.events.length === 0)"
                                      class="text-[9px] opacity-20 hidden md:block">Luma ↗</span>
                                <svg class="chevron w-3.5 h-3.5 opacity-25"
                                     :class="{ open: openConf === conf.id }"
                                     fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                                </svg>
                            </div>
                        </div>

                        <!-- ── Level 2: Expanded ─────────────────── -->
                        <div x-show="openConf === conf.id"
                             x-transition:enter="transition ease-out duration-200"
                             x-transition:enter-start="opacity-0 -translate-y-1"
                             x-transition:enter-end="opacity-100 translate-y-0"
                             class="border-t border-white/5">

                            <!-- Tradedar angle -->
                            <div x-show="conf.opportunity"
                                 class="px-6 py-4 border-b border-white/5"
                                 :class="conf.tier === 1 ? 'tier-1-bg' : (conf.tier === 2 ? 'tier-2-bg' : '')">
                                <p class="text-[11px] opacity-60 leading-relaxed">
                                    <span class="font-bold opacity-100"
                                          :class="{'text-[#bbf7d0]': conf.tier===1, 'text-[#fde68a]': conf.tier===2}">
                                        Tradedar Angle:&nbsp;
                                    </span><span x-text="conf.opportunity"></span>
                                </p>
                            </div>

                            <!-- Side events list -->
                            <template x-if="conf.events && conf.events.length > 0">
                                <div>
                                    <div class="px-6 pt-4 pb-2">
                                        <p class="text-[10px] font-bold uppercase tracking-widest opacity-30">Side Events on Luma</p>
                                    </div>
                                    <template x-for="ev in conf.events" :key="ev.api_id">
                                        <div class="event-row px-6 py-3.5 flex items-center gap-4">
                                            <div class="flex-shrink-0">
                                                <template x-if="ev.cover_url">
                                                    <img :src="ev.cover_url" :alt="ev.name"
                                                         class="event-cover" loading="lazy"
                                                         onerror="this.style.display='none'">
                                                </template>
                                                <div x-show="!ev.cover_url"
                                                     class="event-cover flex items-center justify-center text-[9px] font-bold opacity-15">EVT</div>
                                            </div>
                                            <div class="flex-1 min-w-0">
                                                <p class="text-sm font-medium leading-snug truncate" x-text="ev.name"></p>
                                                <div class="flex gap-3 mt-0.5 flex-wrap">
                                                    <span x-show="ev.start_at" class="text-[10px] opacity-30 font-mono"
                                                          x-text="formatDate(ev.start_at)"></span>
                                                    <span x-show="ev.location" class="text-[10px] opacity-25 truncate max-w-[200px]"
                                                          x-text="ev.location"></span>
                                                </div>
                                            </div>
                                            <button class="btn-signup" @click.stop="signUp(ev)">Sign Up</button>
                                        </div>
                                    </template>
                                    <div class="px-6 py-3 border-t border-white/5 flex justify-end">
                                        <a :href="'https://lu.ma/' + conf.luma_slug" target="_blank"
                                           class="text-[10px] text-[#bbf7d0] opacity-40 hover:opacity-80 transition-opacity uppercase tracking-widest font-bold">
                                            View all on Luma →
                                        </a>
                                    </div>
                                </div>
                            </template>

                            <!-- No events yet — CTA -->
                            <template x-if="!conf.events || conf.events.length === 0">
                                <div class="px-6 py-5 flex items-center justify-between gap-4">
                                    <div>
                                        <p class="text-xs opacity-30 mb-0.5">No Luma side events scraped yet</p>
                                        <p x-show="conf.luma_slug" class="text-[10px] opacity-20">
                                            Luma hub: lu.ma/<span x-text="conf.luma_slug"></span>
                                        </p>
                                    </div>
                                    <div class="flex gap-2 flex-shrink-0">
                                        <a x-show="conf.luma_slug"
                                           :href="'https://lu.ma/' + conf.luma_slug"
                                           target="_blank" class="btn-website">View on Luma</a>
                                        <a x-show="conf.website"
                                           :href="conf.website" target="_blank"
                                           class="btn-website">Official Site ↗</a>
                                    </div>
                                </div>
                            </template>

                        </div>
                    </div>

                </template>
            </div>
        </template>

    </main>

    <script>
    function outrunApp() {
        return {
            rawData:       {},
            loading:       true,
            error:         null,
            openConf:      null,
            activeTier:    null,
            activeQuarter: null,
            activeRegion:  null,
            lastUpdated:   '',

            get allConfs() {
                return this.rawData.conferences || [];
            },
            get totalConfs() {
                return this.allConfs.length;
            },
            get regions() {
                const set = new Set(this.allConfs.map(c => c.region).filter(Boolean));
                return [...set].sort();
            },
            get filteredConfs() {
                return this.allConfs.filter(c => {
                    if (this.activeTier    !== null && c.tier    !== this.activeTier)    return false;
                    if (this.activeQuarter !== null && c.quarter !== this.activeQuarter) return false;
                    if (this.activeRegion  !== null && c.region  !== this.activeRegion)  return false;
                    return true;
                });
            },

            async init() {
                this.loading = true;
                this.error   = null;
                try {
                    const url = 'https://franzenx.github.io/outrun-calendar-data/data.json?t=' + Date.now();
                    const res = await fetch(url);
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    this.rawData = await res.json();

                    if (this.rawData.last_updated) {
                        const d = new Date(this.rawData.last_updated);
                        this.lastUpdated = 'Updated ' + d.toLocaleDateString('en-GB', {
                            day: 'numeric', month: 'short', year: 'numeric'
                        });
                    }

                    // Auto-open first Tier 1 event on load
                    const firstT1 = this.allConfs.find(c => c.tier === 1);
                    if (firstT1) this.openConf = firstT1.id;

                } catch (err) {
                    console.error('[Outrun]', err);
                    this.error = err.message;
                } finally {
                    this.loading = false;
                }
            },

            toggleConf(id) {
                this.openConf = this.openConf === id ? null : id;
            },

            signUp(ev) {
                if (window.LumaCheckout && ev.api_id && ev.api_id.startsWith('evt-')) {
                    window.LumaCheckout.open({ eventId: ev.api_id });
                } else {
                    window.open(ev.url, '_blank', 'noopener,noreferrer');
                }
            },

            formatDate(iso) {
                if (!iso) return '';
                try {
                    const d = new Date(iso);
                    return d.toLocaleDateString('en-GB', {
                        day: 'numeric', month: 'short', year: 'numeric', timeZone: 'UTC'
                    }) + ' · ' + d.toLocaleTimeString('en-GB', {
                        hour: '2-digit', minute: '2-digit', timeZone: 'UTC'
                    }) + ' UTC';
                } catch { return iso; }
            },
        };
    }
    </script>
</body>
</html>
